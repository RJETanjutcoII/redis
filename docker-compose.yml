services:
  mini-redis:
    build: .
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command:
      - --port
      - "6379"
      - --bind
      - "0.0.0.0"
      - --aof-enabled
      - --aof-path
      - /data/appendonly.aof
      - --aof-fsync
      - everysecond

volumes:
  redis-data:
